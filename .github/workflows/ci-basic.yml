name: Basic CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: ${{ github.workspace }}
  PYTEST_ADDOPTS: "--color=yes --tb=short"

jobs:
  # =====================================================================
  # Code Quality and Unit Tests
  # =====================================================================
  quality-and-tests:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h

    - name: Install dependencies
      run: |
        python -m pip install --no-cache-dir --upgrade pip
        pip install --no-cache-dir -e ".[dev]"

    - name: Run linting
      run: |
        pip install ruff
        ruff check lobster/

    - name: Check for deprecated data_manager_v2 imports
      run: |
        # grep exit 0 = violations found (fail CI), exit 1 = no violations (pass)
        if grep -rn "from lobster\.core\.data_manager_v2 import" \
          --include="*.py" \
          --exclude="data_manager_v2.py" \
          --exclude-dir=".claude" --exclude-dir="build" --exclude-dir=".testing" \
          --exclude-dir="kevin_notes" --exclude-dir="skills" \
          lobster/scaffold/ packages/; then
          echo "::error::New code must import from lobster.core.runtime.data_manager, not lobster.core.data_manager_v2"
          exit 1
        fi
        echo "No deprecated data_manager_v2 imports found in scaffold/packages"

    - name: Run contract tests
      run: |
        # Contract tests live in tests/unit/services and packages/*/tests — both
        # require heavy deps (scanpy, agent packages) not installed in Basic CI.
        # Full contract validation runs per-package in the Testing Infrastructure workflow.
        # Here we verify the contract test framework itself is importable.
        python -c "from lobster.testing.contract_mixins import AgentContractTestMixin; print('Contract test framework OK')"

    - name: Run unit/config tests
      run: |
        python -m pytest tests/unit/config \
          -m "not slow and not real_api" \
          --import-mode=importlib \
          --maxfail=10 \
          --durations=10 \
          -v

    - name: Run unit/backend tests
      run: |
        python -m pytest tests/unit/core/backends \
          -m "not slow and not real_api" \
          --import-mode=importlib \
          --maxfail=10 \
          --durations=10 \
          --ignore=tests/unit/core/backends/test_h5ad_backend.py \
          -v

    - name: Run unit/core tests
      run: |
        python -m pytest \
          tests/unit/core/test_client.py \
          tests/unit/core/test_schemas.py \
          tests/unit/core/test_data_manager_v2.py \
          -m "not slow and not real_api" \
          --import-mode=importlib \
          --maxfail=10 \
          --durations=10 \
          -v

    # Agent tests require agent packages (lobster-research, lobster-transcriptomics, etc.)
    # which are only installed in the Testing Infrastructure workflow.
    # Skipping here — full agent tests run per-package in test-packages.yml.

  # =====================================================================
  # Go TUI Verification
  # =====================================================================
  go-tui-verify:
    name: Go TUI Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache-dependency-path: lobster-tui/go.sum

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Extract version for ldflags
      id: version
      run: |
        VERSION=$(grep '__version__' lobster/version.py | sed 's/.*"\(.*\)".*/\1/')
        echo "version=${VERSION:-dev}" >> $GITHUB_OUTPUT

    - name: Run Go tests
      working-directory: lobster-tui
      run: go test ./internal/chat ./internal/protocol ./internal/initwizard -v

    - name: Build Go binary with version injection
      working-directory: lobster-tui
      run: |
        go build -ldflags "-X main.Version=${{ steps.version.outputs.version }}" \
          -o lobster-tui ./cmd/lobster-tui
        echo "Built lobster-tui with version:"
        ./lobster-tui version

    - name: Install Python dependencies
      run: |
        python -m pip install --no-cache-dir --upgrade pip
        pip install --no-cache-dir -e ".[dev]"

    - name: Python bridge smoke test
      env:
        LOBSTER_TUI_BINARY: ${{ github.workspace }}/lobster-tui/lobster-tui
      run: |
        # Verify binary discovery finds the CI-built artifact
        python -c "
        from lobster.cli_internal.go_tui_launcher import find_tui_binary_fast
        binary = find_tui_binary_fast()
        assert binary is not None, 'find_tui_binary_fast() returned None'
        assert 'lobster-tui' in binary, f'Unexpected binary path: {binary}'
        print(f'Binary discovery OK: {binary}')
        "

        # Simulate wheel install: place binary where the package expects it
        # This catches path mismatches between find_tui_binary_fast() and get_binary_path()
        echo "=== Testing wheel-style binary discovery ==="
        cp "$LOBSTER_TUI_BINARY" packages/lobster-ai-tui/lobster_ai_tui/bin/lobster-tui
        chmod +x packages/lobster-ai-tui/lobster_ai_tui/bin/lobster-tui
        pip install -e packages/lobster-ai-tui/ --quiet

        unset LOBSTER_TUI_BINARY
        python -c "
        from lobster_ai_tui import get_binary_path
        binary = get_binary_path()
        assert binary.is_file(), f'get_binary_path() returned non-existent: {binary}'
        print(f'OK: get_binary_path() -> {binary}')

        from lobster.cli_internal.go_tui_launcher import find_tui_binary_fast
        found = find_tui_binary_fast()
        assert found is not None, 'FATAL: find_tui_binary_fast() returned None with wheel installed'
        assert 'bin/lobster-tui' in found, f'Wrong path: {found}'
        print(f'OK: find_tui_binary_fast() -> {found}')
        "
        rm packages/lobster-ai-tui/lobster_ai_tui/bin/lobster-tui

        # Run Go TUI launcher unit tests against built binary
        python -m pytest \
          tests/unit/cli/test_go_tui_launcher_completions.py \
          -m "not slow and not real_api" \
          --import-mode=importlib \
          --maxfail=3 \
          -v || true

  # =====================================================================
  # Build Verification
  # =====================================================================
  build-test:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build and verify package
      run: |
        python -m pip install --no-cache-dir --upgrade pip
        pip install --no-cache-dir build twine
        python -m build
        twine check dist/*
        pip install --no-cache-dir dist/*.whl
        python -c "from lobster.version import __version__; print(f'lobster-ai {__version__} installed')"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 7

  # Integration tests run per-package in the Testing Infrastructure workflow
  # (test-packages.yml) with full dependencies. Not duplicated here.

  # =====================================================================
  # Summary
  # =====================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality-and-tests, build-test, go-tui-verify]
    if: always()

    steps:
    - name: Generate summary
      run: |
        echo "## CI Results" >> $GITHUB_STEP_SUMMARY
        echo "- Code Quality & Tests: ${{ needs.quality-and-tests.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Build Test: ${{ needs.build-test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Go TUI Verify: ${{ needs.go-tui-verify.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- Integration Tests: run in Testing Infrastructure (test-packages.yml)" >> $GITHUB_STEP_SUMMARY
