          packages-dir: dist/
          skip-existing: true
          verbose: true

  # --- Experimental Agent Packages (PyPI + TestPyPI) ---
  # These packages are published publicly but marked as experimental.
  # Their build/publish failures never block stable packages.

  publish-lobster-metadata:
    name: Publish lobster-metadata (experimental)
    needs: [validate-version, build, publish-lobster-ai]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.validate-version.outputs.is_test == 'true' && 'testpypi-lobster-metadata' || 'pypi-lobster-metadata' }}
      url: ${{ needs.validate-version.outputs.is_test == 'true' && 'https://test.pypi.org/project/lobster-metadata/' || 'https://pypi.org/project/lobster-metadata/' }}
    permissions:
      id-token: write
