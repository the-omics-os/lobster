      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ needs.validate-version.outputs.is_test == 'true' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
          packages-dir: dist/
          skip-existing: true
          verbose: true

  # --- Metabolomics (public, was missing from workflow) ---
  publish-lobster-metabolomics:
    name: Publish lobster-metabolomics
    needs: [validate-version, build, publish-lobster-ai]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.validate-version.outputs.is_test == 'true' && 'testpypi-lobster-metabolomics' || 'pypi-lobster-metabolomics' }}
      url: ${{ needs.validate-version.outputs.is_test == 'true' && 'https://test.pypi.org/project/lobster-metabolomics/' || 'https://pypi.org/project/lobster-metabolomics/' }}
    permissions:
