          packages-dir: dist/
          skip-existing: true
          verbose: true

  publish-lobster-structural-viz:
    name: Publish lobster-structural-viz (experimental)
    needs: [validate-version, build, publish-lobster-ai]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.validate-version.outputs.is_test == 'true' && 'testpypi-lobster-structural-viz' || 'pypi-lobster-structural-viz' }}
      url: ${{ needs.validate-version.outputs.is_test == 'true' && 'https://test.pypi.org/project/lobster-structural-viz/' || 'https://pypi.org/project/lobster-structural-viz/' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-lobster-structural-viz
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ needs.validate-version.outputs.is_test == 'true' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
          packages-dir: dist/
          skip-existing: true
          verbose: true

  publish-lobster-drug-discovery:
    name: Publish lobster-drug-discovery (experimental)
    needs: [validate-version, build, publish-lobster-ai]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.validate-version.outputs.is_test == 'true' && 'testpypi-lobster-drug-discovery' || 'pypi-lobster-drug-discovery' }}
      url: ${{ needs.validate-version.outputs.is_test == 'true' && 'https://test.pypi.org/project/lobster-drug-discovery/' || 'https://pypi.org/project/lobster-drug-discovery/' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-lobster-drug-discovery
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ needs.validate-version.outputs.is_test == 'true' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
          packages-dir: dist/
          skip-existing: true
          verbose: true

  # ===========================================================================
  # Step 4: Verify Installation (TestPyPI only)
  # ===========================================================================
  verify-installation:
    name: Verify Installation
    needs:
      - validate-version
      - publish-lobster-ai
      - publish-lobster-transcriptomics
      - publish-lobster-research
      - publish-lobster-visualization
      - publish-lobster-vector
      - publish-lobster-proteomics
      - publish-lobster-genomics
      - publish-lobster-metabolomics
    # Only run on TestPyPI. Does NOT depend on experimental publish jobs so
    # the workflow graph is never blocked by skipped/failed experimental packages.
    if: |
      always() &&
      needs.validate-version.outputs.is_test == 'true' &&
      needs.publish-lobster-ai.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Wait for packages to be available
        run: |
          echo "Waiting 60 seconds for TestPyPI to process packages..."
          sleep 60

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential python3-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Test core installation from TestPyPI
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"

          echo "Installing lobster-ai==$VERSION from TestPyPI..."
          uv pip install --index-url https://test.pypi.org/simple/ \
                         --extra-index-url https://pypi.org/simple \
                         --index-strategy unsafe-best-match \
                         --system \
                         lobster-ai==$VERSION

          python -c "from lobster.version import __version__; print(f'Version: {__version__}')"
          lobster --help

      - name: Verify Go TUI binary discovery
        run: |
          echo "=== Verifying lobster-ai-tui wheel installed ==="
          python -c "
          from lobster_ai_tui import get_binary_path
          binary = get_binary_path()
          print(f'TUI binary path: {binary}')
          assert binary.is_file(), f'Binary not found at {binary}'
          print('OK: get_binary_path() found the binary')
          "

          echo "=== Verifying find_tui_binary_fast() finds it ==="
          python -c "
          from lobster.cli_internal.go_tui_launcher import find_tui_binary_fast
          binary = find_tui_binary_fast()
          assert binary is not None, 'FATAL: find_tui_binary_fast() returned None — binary discovery is broken'
          print(f'OK: find_tui_binary_fast() -> {binary}')
          "

          echo "=== Verifying binary is executable ==="
          BINARY=$(python -c "from lobster_ai_tui import get_binary_path; print(get_binary_path())")
          chmod +x "$BINARY"
          "$BINARY" version

      - name: Test public agent packages
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"

          echo "Installing lobster-ai[full]==$VERSION from TestPyPI..."
          uv pip install --index-url https://test.pypi.org/simple/ \
                         --extra-index-url https://pypi.org/simple \
                         --index-strategy unsafe-best-match \
                         --system \
                         "lobster-ai[full]==$VERSION"

          python -c "
          from lobster.core.component_registry import component_registry
          agents = component_registry.list_agents()
          print(f'Discovered {len(agents)} agents:')
          for agent in sorted(agents):
              print(f'  - {agent}')
          assert len(agents) >= 5, f'Expected at least 5 agents with [full], found {len(agents)}'
          print('SUCCESS: Public agent packages installed and discovered')
          "

      - name: Test experimental agent packages (best-effort)
        continue-on-error: true
        run: |
          echo "Installing experimental packages from TestPyPI (best-effort)..."
          uv pip install --index-url https://test.pypi.org/simple/ \
                         --extra-index-url https://pypi.org/simple \
                         --index-strategy unsafe-best-match \
                         --system \
                         lobster-metadata lobster-ml lobster-structural-viz lobster-drug-discovery || true

          python -c "
          from lobster.core.component_registry import component_registry
          agents = component_registry.list_agents()
          print(f'Total agents discovered: {len(agents)}')
          for agent in sorted(agents):
              print(f'  - {agent}')
          if len(agents) >= 20:
              print('SUCCESS: All agent packages (stable + experimental) installed')
          else:
              print(f'PARTIAL: {len(agents)} agents found (some experimental packages may not have published)')
          "

  # ===========================================================================
  # Step 5: Release Summary
  # ===========================================================================
  summary:
    name: Release Summary
    needs:
      - validate-version
      - build
      - publish-lobster-ai
      - publish-lobster-transcriptomics
      - publish-lobster-research
      - publish-lobster-visualization
      - publish-lobster-vector
      - publish-lobster-proteomics
      - publish-lobster-genomics
      - publish-lobster-metabolomics
    # Only depend on stable packages so production PyPI runs are never
    # blocked by failed experimental-package jobs.
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate summary
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          IS_TEST="${{ needs.validate-version.outputs.is_test }}"
          TARGET=$([[ "$IS_TEST" == "true" ]] && echo "TestPyPI" || echo "PyPI")

          echo "## Package Publishing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** $TARGET" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Stable Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-ai | ${{ needs.publish-lobster-ai.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-transcriptomics | ${{ needs.publish-lobster-transcriptomics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-research | ${{ needs.publish-lobster-research.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-visualization | ${{ needs.publish-lobster-visualization.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-vector | ${{ needs.publish-lobster-vector.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-proteomics | ${{ needs.publish-lobster-proteomics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-genomics | ${{ needs.publish-lobster-genomics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-metabolomics | ${{ needs.publish-lobster-metabolomics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Experimental Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-metadata | check job above |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-ml | check job above |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-structural-viz | check job above |" >> $GITHUB_STEP_SUMMARY
          echo "| lobster-drug-discovery | check job above |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Experimental packages publish independently — their failures never block stable packages.*" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$IS_TEST" == "true" ]]; then
            echo "### Install from TestPyPI" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple lobster-ai==$VERSION" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "### Install from PyPI" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "pip install lobster-ai" >> $GITHUB_STEP_SUMMARY
            echo "pip install lobster-ai[full]  # with all stable agents" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # Step 6: Trigger Omics-OS Cloud Deployment
  # ===========================================================================
  trigger-cloud-deploy:
    name: Trigger Cloud Deploy
    needs:
      - validate-version
      - publish-lobster-ai
    # Only fire when core package published successfully
    if: needs.publish-lobster-ai.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Wait for PyPI index propagation
        run: sleep 60

      - name: Dispatch to lobster-cloud
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.LOBSTER_CLOUD_DEPLOY_TOKEN }}
          repository: the-omics-os/lobster-cloud
          event-type: lobster-packages-published
          client-payload: >-
            {
              "version": "${{ needs.validate-version.outputs.version }}",
              "is_test": "${{ needs.validate-version.outputs.is_test }}",
              "source_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
