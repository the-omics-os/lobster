          skip-existing: true
          verbose: true

  publish-lobster-vector:
    name: Publish lobster-vector
    needs: [validate-version, build, publish-lobster-ai]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.validate-version.outputs.is_test == 'true' && 'testpypi-lobster-vector' || 'pypi-lobster-vector' }}
      url: ${{ needs.validate-version.outputs.is_test == 'true' && 'https://test.pypi.org/project/lobster-vector/' || 'https://pypi.org/project/lobster-vector/' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-lobster-vector
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
