<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%"><defs><filter id="glow-core" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2.5" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter><pattern id="dotGridCore" width="16" height="16" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.5" fill="rgba(255,255,255,0.08)" /></pattern></defs><rect width="700" height="350" fill="#050505" /><rect width="700" height="350" fill="url(#dotGridCore)" /><g transform="translate(150, 40)"><rect x="0" y="0" width="400" height="270" rx="8" fill="#050505" stroke="#f97316" stroke-width="1" /><text x="200" y="-12" fill="#f97316" font-size="12" font-family="monospace" text-anchor="middle" font-weight="bold" letter-spacing="2">LOBSTER-AI KERNEL</text><path d="M 200 15 L 200 255" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="20 250" opacity="0.5"><animate attributeName="stroke-dashoffset" from="270" to="0" dur="3s" repeatCount="indefinite" /></path><g transform="translate(20, 20)"><rect x="0" y="0" width="360" height="40" rx="4" fill="#0a0a0a" stroke="rgba(249,115,22,0.5)" stroke-width="1" /><text x="180" y="18" fill="#fff" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">SUPERVISOR</text><text x="180" y="30" fill="#777" font-size="8" font-family="monospace" text-anchor="middle">LangGraph • Intent Routing • Context Budgeting</text></g><g transform="translate(20, 75)"><rect x="0" y="0" width="360" height="40" rx="4" fill="#0a0a0a" stroke="rgba(255,255,255,0.2)" stroke-width="1" /><rect x="-2" y="10" width="4" height="20" fill="#f97316" filter="url(#glow-core)" /><text x="180" y="18" fill="#fff" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">DATA MANAGER V2</text><text x="180" y="30" fill="#777" font-size="8" font-family="monospace" text-anchor="middle">W3C-PROV Tracking • Modality Orchestration</text></g><g transform="translate(20, 130)"><rect x="0" y="0" width="360" height="40" rx="4" fill="#0a0a0a" stroke="rgba(255,255,255,0.2)" stroke-width="1" /><text x="180" y="18" fill="#fff" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">DISCOVERY REGISTRIES</text><text x="180" y="30" fill="#777" font-size="8" font-family="monospace" text-anchor="middle">ComponentRegistry • OmicsRegistry (Zero-Config Setup)</text></g><g transform="translate(20, 185)"><rect x="0" y="0" width="170" height="60" rx="4" fill="#111" stroke="rgba(255,255,255,0.1)" stroke-width="1" /><text x="85" y="24" fill="#fff" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">PROVIDERS</text><text x="85" y="38" fill="#777" font-size="8" font-family="monospace" text-anchor="middle">GEO, MetaboLights,</text><text x="85" y="50" fill="#777" font-size="8" font-family="monospace" text-anchor="middle">PubMed, SRA</text></g><g transform="translate(210, 185)"><rect x="0" y="0" width="170" height="60" rx="4" fill="#111" stroke="rgba(255,255,255,0.1)" stroke-width="1" /><text x="85" y="24" fill="#fff" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">ADAPTERS</text><text x="85" y="38" fill="#777" font-size="8" font-family="monospace" text-anchor="middle">AnnData, VCF, PLINK,</text><text x="85" y="50" fill="#777" font-size="8" font-family="monospace" text-anchor="middle">Spectronaut, Seurat</text></g></g></svg>
