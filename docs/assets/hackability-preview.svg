an><tspan fill="#f8f8f2">,</tspan></text><text y="136"><tspan fill="#f8f8f2">    tier_requirement</tspan><tspan fill="#f92672">=</tspan><tspan fill="#e6db74">"free"</tspan></text><text y="154"><tspan fill="#f8f8f2">)</tspan></text><text y="182"><tspan fill="#66d9ef">def</tspan> <tspan fill="#a6e22e">analyze_pathway</tspan><tspan fill="#f8f8f2">(adata, </tspan><tspan fill="#fd971f">**params</tspan><tspan fill="#f8f8f2">):</tspan></text><text y="200" fill="#75715e">    # 2. Return the 3-tuple (AnnData, Dict, AnalysisStep)</text><text y="218" fill="#75715e">    # 3. Follow the AQUADIF taxonomy</text><text y="236"><tspan fill="#f8f8f2">    stats </tspan><tspan fill="#f92672">=</tspan><tspan fill="#f8f8f2"> {</tspan><tspan fill="#e6db74">"n_metabolites"</tspan><tspan fill="#f8f8f2">: adata.n_obs, </tspan><tspan fill="#e6db74">"status"</tspan><tspan fill="#f8f8f2">: </tspan><tspan fill="#e6db74">"complete"</tspan><tspan fill="#f8f8f2">}</tspan></text></g></svg>
