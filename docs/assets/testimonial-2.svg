<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130" width="100%" height="100%"><rect width="400" height="130" rx="12" fill="#0a0a0a" stroke="rgba(249,115,22,0.15)" stroke-width="1" /><g transform="translate(20, 20)"><circle cx="20" cy="20" r="20" fill="#111" stroke="rgba(255,255,255,0.1)" stroke-width="1"/><text x="20" y="24" fill="#555" font-family="monospace" font-size="14" text-anchor="middle">JH</text><text x="55" y="16" fill="#fff" font-family="sans-serif" font-weight="bold" font-size="14">Jules Hutter</text><text x="55" y="32" fill="#777" font-family="sans-serif" font-size="12">PhD Student, University of Zurich</text></g><text x="20" y="80" fill="#bbb" font-family="sans-serif" font-size="13" font-style="italic"><tspan x="20" dy="0">"My supervisor asked how I did a full DE analysis</tspan><tspan x="20" dy="18">in one afternoon. I said lobster chat. He thought</tspan><tspan x="20" dy="18">I was talking about lunch."</tspan></text></svg>
