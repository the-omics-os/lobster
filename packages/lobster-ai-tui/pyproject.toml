[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "lobster-ai-tui"
version = "1.1.407"
description = "Go TUI binary for Lobster AI (Charm/BubbleTea)"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.11"
authors = [{name = "Kevin Yar", email = "kevin.yar@omics-os.com"}]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]

[project.urls]
Homepage = "https://lobsterbio.com"
Repository = "https://github.com/the-omics-os/lobster"

[tool.setuptools.packages.find]
where = ["."]
include = ["lobster_ai_tui*"]

[tool.setuptools.package-data]
lobster_ai_tui = ["bin/*"]
